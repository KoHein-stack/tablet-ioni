<ion-content class="register-content">
  <ng-container *ngIf="!isLoading; else loading">
    <ion-header [translucent]="true">
      <ion-toolbar class="register-toolbar">
        <ion-title>TKKS</ion-title>
        <ion-buttons slot="end">
          <!-- <ion-button class="refresh-button" fill="clear" shape="round" (click)="refreshDeviceDetails()"
            aria-label="Refresh device details">
            <ion-icon slot="icon-only" name="refresh-outline"></ion-icon>
          </ion-button> -->
        </ion-buttons>
      </ion-toolbar>
    </ion-header>

    <div class="register-shell ion-padding">
      <section class="form-card">
        <div class="card-head">
          <h2>タブレットの申請依頼</h2>
        </div>

        <form (ngSubmit)="submit()">
          <div class="field-group">
            <label class="field-label" for="userId">ユーザーID</label>
            <ion-item lines="none" class="field-item">
              <ion-input id="userId" name="userId" [(ngModel)]="form.userId" placeholder="Enter user ID"
                autocomplete="username" required>
              </ion-input>
            </ion-item>
          </div>

          <div class="field-group">
            <label class="field-label" for="deviceId">Device ID</label>
            <ion-item lines="none" class="field-item readonly">
              <ion-input id="deviceId" [value]="form.deviceId" readonly>
              </ion-input>
            </ion-item>
          </div>

          <div class="field-group">
            <label class="field-label" for="manufacturer">Manufacturer</label>
            <ion-item lines="none" class="field-item readonly">
              <ion-input id="manufacturer" [value]="form.manufacturer" readonly>
              </ion-input>
            </ion-item>
          </div>

          <!-- <p class="helper-text">This information is stored on the tablet so the app can recognize the assigned user
            next time.</p> -->
          <p class="error-text" *ngIf="errorMessage">{{ errorMessage }}</p>

          <div class="button-group" style="display: flex;">
            <ion-button class="primary-action" expand="block" shape="round" type="submit" [disabled]="!canSubmit">
              申請
            </ion-button>
            <ion-button class="primary-action" expand="block" shape="round" type="cancel" (click)="cancel()">
              終了 </ion-button>
          </div>
        </form>
      </section>
    </div>
  </ng-container>

  <ng-template #loading>
    <div class="register-loading">
      <ion-spinner name="crescent"></ion-spinner>
      <p>Preparing registration...</p>
    </div>
  </ng-template>
</ion-content>
